services:
  nginx:
    image: nginx:1.27-alpine
    container_name: smart-classroom-nginx
    restart: unless-stopped
    env_file:
      - .env.prod
    command: >-
      /bin/sh -c "envsubst '$$BACKEND_DOMAIN' < /etc/nginx/templates/backend.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/backend.conf:/etc/nginx/templates/backend.conf.template:ro
      - ./docker/letsencrypt:/etc/letsencrypt
      - ./docker/certbot-webroot:/var/www/certbot
