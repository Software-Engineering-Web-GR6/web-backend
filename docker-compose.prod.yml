services:
  postgres:
    image: postgres:17
    container_name: smart-classroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: smart-classroom-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  backend:
    image: ${BACKEND_IMAGE}
    container_name: smart-classroom-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MQTT_ENABLED: "true"
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: "1883"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt-broker:
        condition: service_started

  sensor-simulator:
    image: ${BACKEND_IMAGE}
    container_name: smart-classroom-sensor-simulator
    restart: unless-stopped
    command: [ "python", "sensor_simulator.py" ]
    env_file:
      - .env.prod
    environment:
      BACKEND_BASE_URL: http://backend:8000
      SIMULATOR_TRANSPORT: mqtt
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: "1883"
    depends_on:
      backend:
        condition: service_started
      mqtt-broker:
        condition: service_started
    profiles: [ "demo" ]

  device-command-simulator:
    image: ${BACKEND_IMAGE}
    container_name: smart-classroom-device-simulator
    restart: unless-stopped
    command: [ "python", "device_command_simulator.py" ]
    env_file:
      - .env.prod
    environment:
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: "1883"
    depends_on:
      mqtt-broker:
        condition: service_started
    profiles: [ "demo" ]

volumes:
  postgres-data:
