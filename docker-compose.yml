services:
  postgres:
    image: postgres:17
    container_name: smart-classroom-backend-postgres
    environment:
      POSTGRES_DB: smart_classroom
      POSTGRES_USER: smartclassroom
      POSTGRES_PASSWORD: smartclassroom
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartclassroom -d smart_classroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    container_name: smart-classroom-backend-app
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://smartclassroom:smartclassroom@postgres:5432/smart_classroom
      MQTT_ENABLED: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
