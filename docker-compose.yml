version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: smart_classroom_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: smart_classroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: smart_classroom_backend
    restart: always
    depends_on:
      - postgres
    environment:
      APP_NAME: Smart Classroom Backend
      APP_VERSION: 1.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: smart_classroom
      SECRET_KEY: super-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"

volumes:
  postgres_data:
