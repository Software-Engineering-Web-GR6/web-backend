name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smartclassroom
          POSTGRES_PASSWORD: smartclassroom
          POSTGRES_DB: smart_classroom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U smartclassroom -d smart_classroom_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://smartclassroom:smartclassroom@localhost:5432/smart_classroom_test
      TEST_DATABASE_URL: postgresql+asyncpg://smartclassroom:smartclassroom@localhost:5432/smart_classroom_test
      MQTT_ENABLED: "false"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q
